<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b5fff" />
    <meta
      name="description"
      content="BookingsPlus SaaS Booking Engine built on Zoho Catalyst"
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>BookingsPlus Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!--
      Zoho Catalyst Web SDK v4
      1. catalystWebSDK.js  – core library (defines window.catalyst namespace)
      2. /__catalyst/sdk/init.js – project-specific init script served by
         Catalyst environment (sets project key, domain, etc.)
      Both must load before catalyst.auth.* APIs can be called.
      The React app polls for window.catalyst.auth readiness.
    -->
    <script src="https://static.zohocdn.com/catalyst/sdk/js/4.0.0/catalystWebSDK.js"></script>
    <script src="/__catalyst/sdk/init.js" onerror="console.warn('Catalyst init.js not available — running outside Catalyst environment?')"></script>
  </body>
</html>
